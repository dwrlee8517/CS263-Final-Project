models:
  # - gpt-5.2-2025-12-11
  # - gemini-3-flash-preview
  # - google/gemma-3-12b-it
  # - meta-llama/Llama-3.1-8B-Instruct
  - google/medgemma-27b-text-it
  - Qwen/Qwen3-8B

config:
  split: test
  sample_size: 1000
  seed: 42
  temperature: 0.0
  max_tokens: 512
  retry_on_invalid: 1
  reasoning_effort: null
  prompt_mode: few_shot  # zero_shot | few_shot
  few_shot_examples:
    # PubHealth examples
    - claim: "Global coronavirus death toll hits 150,000: Reuters tally."
      label: "true"
    - claim: "Photographs show a boy having his arm crushed under a truck as a punishment for stealing bread."
      label: "false"
    - claim: "Pepsi admitted that Aquafina is just tap water."
      label: "mixture"
    # Intel examples
    - claim: "Vaccines have been shown to be effective in preventing serious illness and death from COVID-19."
      label: "true"
    - claim: "The moon landing was faked by NASA to create a sense of American superiority."
      label: "false"
    - claim: "Mail-in ballots can be vulnerable to tampering, but many states have implemented secure measures to ensure their integrity."
      label: "mixture"

paths:
  main_dir: .
  artifacts_dir: artifacts
